name: Build and push runner image

on:
  push:
    branches: [master]
  schedule:
    # Wöchentlich rebuilden um base-image security updates mitzunehmen
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/plaintext-gmbh/plaintext-gh-runner:latest
            ghcr.io/plaintext-gmbh/plaintext-gh-runner:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
