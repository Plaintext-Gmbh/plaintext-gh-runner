name: Build and push runner image

on:
  push:
    branches: [master]
  schedule:
    # Wöchentlich rebuilden um base-image security updates mitzunehmen
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            context: .
            dockerfile: Dockerfile
            tag-suffix: latest
          - variant: twingate
            context: twingate
            dockerfile: twingate/Dockerfile
            tag-suffix: twingate
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/plaintext-gmbh/plaintext-gh-runner:${{ matrix.tag-suffix }}
            ghcr.io/plaintext-gmbh/plaintext-gh-runner:${{ matrix.tag-suffix }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max
